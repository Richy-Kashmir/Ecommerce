<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle – Instrumento | Tienda</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

<header class="cabecera">
    <div class="contenido PorDefecto">
        <a href="index.html" class="logo"><img src="Imagenes/Logo.png" alt="Logo Harmonic Studio"></a>

        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html">Instrumentos</a></li>
                <li><a href="cart.html">Carrito</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>

        <div class="acciones">
            <button class="btn btn-uno" id="searchBtn">Buscar</button>
            <button class="btn btn-dos" id="cartIcon">🛒 Carrito</button>
        </div>
    </div>
</header>

<section class="product-detail contenido">
    <div class="product-info">
        <img id="productImg" src="" alt="Imagen del instrumento" class="product-image">
        <h2 id="productTitle">Producto</h2>
        <p id="productCategory"></p>
        <p id="productPrice">Precio: $<span class="price-value"></span></p>

        <div class="product-actions">
            <label for="qtySelect">Cantidad:</label>
            <select id="qtySelect">
                <!-- opciones generadas por script.js -->
            </select>

            <button class="btn btn-uno" id="addToCartBtn">Añadir al carrito</button>
        </div>
    </div>
</section>

<footer class="site-footer">
    <div class="contenido footer-inner">
        <p>&copy; 2026 Harmonic Studio. Todos los derechos reservados.</p>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
